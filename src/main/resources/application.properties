spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true
spring.datasource.url=jdbc:postgresql://localhost:5432/CarRental
spring.datasource.username=postgres
spring.datasource.password=Deniz2002
spring.jpa.properties.javax.persistence.validation.mode = none

# Run schema.sql on startup, AFTER Hibernate creates entity-backed tables.
# IF NOT EXISTS in schema.sql means diagram tables that overlap entity
# tables (country, city, street, building_no, car_brand, model, price,
# discount, transmission_type, fuel_type) keep the entity's shape; the
# rest of the diagram's tables are created fresh.
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
spring.jpa.defer-datasource-initialization=true

# Swagger UI: keep "Try it out" enabled, sort endpoints by HTTP method, persist
# the basic-auth credentials across page reloads.
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.persist-authorization=true

# Stable dev credentials for HTTP Basic. Use admin/admin in Swagger's Authorize
# dialog. Replaces the random GUID password Spring would otherwise log on each
# startup. Replace this before deploying anywhere non-local.
spring.security.user.name=admin
spring.security.user.password={noop}admin

# JWT secret for the customer auth flow. Must be at least 32 bytes (256 bits)
# for HMAC-SHA256. Rotate before any non-local deployment — leaking this lets
# anyone mint tokens for any account.
app.security.jwt.secret=change-me-to-a-long-random-string-at-least-32-bytes-please
app.security.jwt.ttl-seconds=86400

# User photo uploads land here. The dir is created on startup if missing and
# served back at /uploads/**. Path is resolved against the JVM working dir, so
# running from IntelliJ puts uploads/ in the project root; running the jar
# from a different cwd puts them next to wherever you launched.
app.media.upload-dir=${user.dir}/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
